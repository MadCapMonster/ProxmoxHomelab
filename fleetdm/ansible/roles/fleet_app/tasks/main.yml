---
- name: Create Fleet app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/fleet
    - /opt/fleet/certs
    - /etc/fleet

- name: Deploy Fleet env file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/fleet/.env
    owner: root
    group: root
    mode: '0600'
  notify: Restart fleet compose

- name: Deploy Fleet compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/fleet/docker-compose.yml
    owner: root
    group: root
    mode: '0644'
  notify: Restart fleet compose

- name: Deploy Fleet config marker
  ansible.builtin.template:
    src: fleet.yml.j2
    dest: /etc/fleet/fleet.yml
    owner: root
    group: root
    mode: '0644'

- name: Start Fleet compose stack
  community.docker.docker_compose_v2:
    project_src: /opt/fleet
    state: present
