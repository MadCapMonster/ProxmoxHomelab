- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-contrib
    state: present

- name: Listen on private network
  ansible.builtin.lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = '*'"
  notify: restart postgresql
  ignore_errors: true

- name: Allow Fleet app host to connect
  ansible.builtin.lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    line: "host {{ fleet_db_name }} {{ fleet_db_user }} {{ hostvars[groups['fleet_app'][0]].ansible_host }}/32 scram-sha-256"
  notify: restart postgresql
  ignore_errors: true

- name: Ensure PostgreSQL service is running
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Create Fleet database user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ fleet_db_user }}"
    password: "{{ fleet_db_password }}"

- name: Create Fleet database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ fleet_db_name }}"
    owner: "{{ fleet_db_user }}"

- name: Restart PostgreSQL after config change
  ansible.builtin.service:
    name: postgresql
    state: restarted
