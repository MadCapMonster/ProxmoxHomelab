---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ required_packages }}"
    state: present

- name: Ensure /etc/fleet exists
  ansible.builtin.file:
    path: /etc/fleet
    state: directory
    owner: root
    group: root
    mode: '0755'
