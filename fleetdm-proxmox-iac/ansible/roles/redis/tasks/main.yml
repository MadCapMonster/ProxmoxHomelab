---
- name: Install Redis
  ansible.builtin.apt:
    name: redis-server
    state: present
    update_cache: true

- name: Configure Redis private bind
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind '
    line: "bind 127.0.0.1 {{ ansible_default_ipv4.address }}"
  notify: Restart redis

- name: Keep protected mode enabled
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^protected-mode '
    line: 'protected-mode yes'
  notify: Restart redis

- name: Allow Redis from app host
  community.general.ufw:
    rule: allow
    port: "6379"
    proto: tcp
    from_ip: "{{ hostvars[groups['fleet_app'][0]].ansible_host }}"

- name: Ensure Redis is enabled
  ansible.builtin.service:
    name: redis-server
    enabled: true
    state: started

handlers:
  - name: Restart redis
    ansible.builtin.service:
      name: redis-server
      state: restarted
