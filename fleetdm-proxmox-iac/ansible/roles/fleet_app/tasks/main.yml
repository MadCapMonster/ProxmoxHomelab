---
- name: Create fleet user
  ansible.builtin.user:
    name: fleet
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/fleet

- name: Create Fleet directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: fleet
    group: fleet
    mode: '0750'
  loop:
    - /etc/fleet
    - /etc/fleet/certs
    - /var/lib/fleet

- name: Download latest Fleet release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/fleetdm/fleet/releases/latest
    return_content: true
  register: fleet_release
  when: fleet_version == 'latest'

- name: Set Fleet version fact
  ansible.builtin.set_fact:
    fleet_effective_version: "{{ (fleet_release.json.tag_name | default(fleet_version)) | regex_replace('^v','') }}"

- name: Download Fleet binary archive
  ansible.builtin.get_url:
    url: "https://github.com/fleetdm/fleet/releases/download/fleet-v{{ fleet_effective_version }}/fleet_v{{ fleet_effective_version }}_linux.tar.gz"
    dest: /tmp/fleet.tar.gz
    mode: '0644'

- name: Unpack Fleet binary
  ansible.builtin.unarchive:
    src: /tmp/fleet.tar.gz
    dest: /tmp
    remote_src: true

- name: Install fleet and fleetctl binaries
  ansible.builtin.copy:
    src: "/tmp/linux/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: '0755'
  loop: [fleet, fleetctl]

- name: Write Fleet environment file
  ansible.builtin.template:
    src: fleet.env.j2
    dest: /etc/fleet/fleet.env
    owner: root
    group: fleet
    mode: '0640'
  notify: Restart fleet

- name: Write Fleet systemd service
  ansible.builtin.template:
    src: fleet.service.j2
    dest: /etc/systemd/system/fleet.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart fleet

- name: Allow Fleet HTTPS/API port
  community.general.ufw:
    rule: allow
    port: "8080"
    proto: tcp

- name: Run Fleet DB migrations
  ansible.builtin.command: /usr/local/bin/fleet prepare db
  environment:
    FLEET_MYSQL_ADDRESS: "{{ fleet_mysql_address }}"
    FLEET_MYSQL_DATABASE: "{{ fleet_mysql_database }}"
    FLEET_MYSQL_USERNAME: "{{ fleet_mysql_user }}"
    FLEET_MYSQL_PASSWORD: "{{ fleet_mysql_password }}"
  changed_when: false

- name: Enable Fleet
  ansible.builtin.systemd:
    name: fleet
    daemon_reload: true
    enabled: true
    state: started

handlers:
  - name: Restart fleet
    ansible.builtin.systemd:
      name: fleet
      daemon_reload: true
      state: restarted
