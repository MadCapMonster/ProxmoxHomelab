trigger:
  branches: { include: [main] }
parameters:
- name: environment
  type: string
  default: dev
  values: [dev, uat, prd]
variables:
  TF_ROOT: terraform/environments/${{ parameters.environment }}
  ANSIBLE_INVENTORY: ansible/inventory/${{ parameters.environment }}.yml
stages:
- stage: validate
  jobs:
  - job: validate
    pool: { vmImage: ubuntu-latest }
    steps:
    - script: terraform -chdir=$(TF_ROOT) init -backend=false && terraform -chdir=$(TF_ROOT) validate
      displayName: Terraform validate
    - script: python3 -m pip install --user ansible ansible-lint && ansible-galaxy collection install community.general community.mysql && ansible-lint ansible/site.yml || true
      displayName: Ansible lint
- stage: plan
  dependsOn: validate
  jobs:
  - job: plan
    pool: { vmImage: ubuntu-latest }
    steps:
    - script: terraform -chdir=$(TF_ROOT) init -backend-config=backend.hcl && terraform -chdir=$(TF_ROOT) plan -out=tfplan
      env: { TF_VAR_proxmox_api_token: $(PROXMOX_API_TOKEN) }
      displayName: Terraform plan
- stage: apply
  dependsOn: plan
  jobs:
  - deployment: apply
    environment: fleetdm-${{ parameters.environment }}
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - script: terraform -chdir=$(TF_ROOT) apply -auto-approve && ansible-playbook -i $(ANSIBLE_INVENTORY) ansible/site.yml
            env: { TF_VAR_proxmox_api_token: $(PROXMOX_API_TOKEN) }
